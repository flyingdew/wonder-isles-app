name: Build Android APK & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version_tag:
        description: "版本 tag（留空表示只构建 apk 不发 release，例如 v0.1.1）"
        required: false
        default: ""
      prerelease:
        description: "标记为 pre-release"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # 发 release 需要

jobs:
  build-apk:
    name: Build Flutter Release APK
    runs-on: ubuntu-latest
    outputs:
      apk_name: ${{ steps.rename.outputs.apk_name }}
      version_tag: ${{ steps.meta.outputs.version_tag }}
    env:
      JAVA_VERSION: "17"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java (Temurin ${{ env.JAVA_VERSION }})
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter --version && flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      # 若仓库配置了 ANDROID_KEYSTORE_BASE64 / ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS / ANDROID_KEY_PASSWORD
      # 就落一个 key.properties 到 android/，同时把 keystore 解码到 android/app/upload-keystore.jks；
      # 需要你自己把 android/app/build.gradle.kts 的 signingConfigs 换成读取 key.properties（模版见 README）。
      - name: Prepare Android release signing (optional)
        id: signing
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "${KEYSTORE_B64}" ]; then
            echo "🔐 Detected keystore secret — writing keystore & key.properties"
            echo "${KEYSTORE_B64}" | base64 -d > android/app/upload-keystore.jks
            cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "ℹ️  No release keystore secrets — falling back to debug signing."
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve version metadata
        id: meta
        run: |
          # 版本 tag：tag push → GITHUB_REF_NAME；workflow_dispatch → 手动输入；否则用 pubspec + short sha
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          elif [ -n "${{ inputs.version_tag }}" ]; then
            TAG="${{ inputs.version_tag }}"
          else
            PUBSPEC_VER=$(awk '/^version:/ {print $2; exit}' pubspec.yaml | tr -d '"')
            TAG="dev-${PUBSPEC_VER}-${GITHUB_SHA::7}"
          fi
          echo "version_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "🏷️  Version tag: ${TAG}"

      - name: Build APK (release, split-per-abi + universal)
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --dart-define=BUILD_SHA=${GITHUB_SHA::7}
          flutter build apk \
            --release \
            --dart-define=BUILD_SHA=${GITHUB_SHA::7}

      - name: Rename APK outputs
        id: rename
        run: |
          TAG="${{ steps.meta.outputs.version_tag }}"
          OUT_DIR="build/app/outputs/flutter-apk"
          mkdir -p dist
          # 通用包
          if [ -f "${OUT_DIR}/app-release.apk" ]; then
            cp "${OUT_DIR}/app-release.apk" "dist/wonder-isles-${TAG}-universal.apk"
          fi
          # 分 ABI 包
          for abi in armeabi-v7a arm64-v8a x86_64; do
            if [ -f "${OUT_DIR}/app-${abi}-release.apk" ]; then
              cp "${OUT_DIR}/app-${abi}-release.apk" "dist/wonder-isles-${TAG}-${abi}.apk"
            fi
          done
          echo "📦 Built artifacts:"
          ls -lh dist/
          echo "apk_name=wonder-isles-${TAG}-universal.apk" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wonder-isles-apk-${{ steps.meta.outputs.version_tag }}
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        # 只在打 tag 或手动传了 version_tag 时发 release；纯 dev 构建只留 artifact 不发 release
        if: github.ref_type == 'tag' || inputs.version_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version_tag }}
          name: ${{ steps.meta.outputs.version_tag }}
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease == 'true' }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.apk
          body: |
            ## 奇思岛 · Wonder Isles ${{ steps.meta.outputs.version_tag }}

            - Commit：`${{ github.sha }}`
            - 签名：${{ steps.signing.outputs.signed == 'true' && '✅ 正式 keystore' || '⚠️ debug keystore（内测用，正式发布请配置签名 secrets）' }}

            ### 下载

            - `wonder-isles-<tag>-universal.apk`：通用包（最省事，安装大约 60+ MB）
            - `wonder-isles-<tag>-arm64-v8a.apk`：主流真机（≈ 25 MB）
            - `wonder-isles-<tag>-armeabi-v7a.apk`：老设备
            - `wonder-isles-<tag>-x86_64.apk`：模拟器/极少数 x86 设备

      - name: Summary
        run: |
          {
            echo "## Android APK 构建完成"
            echo ""
            echo "- Tag：\`${{ steps.meta.outputs.version_tag }}\`"
            echo "- Commit：\`${GITHUB_SHA::7}\`"
            echo "- 签名：\`${{ steps.signing.outputs.signed == 'true' && 'release keystore' || 'debug keystore' }}\`"
            echo ""
            echo "### 产物"
            for f in dist/*.apk; do
              size=$(du -h "$f" | cut -f1)
              echo "- \`$(basename "$f")\` — ${size}"
            done
          } >> "$GITHUB_STEP_SUMMARY"
