name: wonder_isles
description: "奇思岛 · 字之岛 — 面向 6-8 岁孩子的汉字考古学习游戏 (Flutter 版)。"
publish_to: "none"
version: 0.1.5+5

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ">=2.3.2 <2.4.0"
  provider: ^6.1.2
  audioplayers: ^6.1.0

  # 自动更新（仅 Android release 生效）
  package_info_plus: ^8.0.0
  http: ^1.2.0
  dio: ^5.7.0
  path_provider: ^2.1.4
  open_filex: ^4.5.0
  permission_handler: ^11.3.1
  device_info_plus: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/characters.json
    - assets/scenes/
    - assets/voice/
    - assets/bgm/
    - assets/sfx/
    - assets/glyph/ri/
    - assets/glyph/yue/
    - assets/glyph/shui/
    - assets/glyph/yu/
    - assets/glyph/huo/
    - assets/glyph/shan/
    - assets/glyph/mu_tree/
    - assets/glyph/niao/
    - assets/glyph/yu_rain/
    - assets/glyph/mu_eye/
    - assets/glyph/ren/
    - assets/glyph/kou/
    - assets/glyph/men/
    - assets/glyph/er/
    - assets/glyph/shou/
    - assets/glyph/tian/
    - assets/glyph/niu/
    - assets/glyph/yang/
    - assets/glyph/ma/
    - assets/glyph/zu/




